data:
  data_root: data
  dataset: hipe2020
  language: fr
  label_column: NE-COARSE-LIT
  test_file: null
  dev_size: 0.1
  keep_scope: false
  drop_empty_examples: true

model:
  model_name: urchade/gliner_medium-v2.1
  labels:
    - person
    - location
    - organization
    - product
    - time

training:
  output_dir: outputs/chronogliner_ft_hipe2020_fr
  seed: 42
  max_steps: 1500
  per_device_train_batch_size: 2
  learning_rate: 0.000003
  threshold: 0.35
  fp16: false
  bf16: false

hub:
  push_to_hub: false
  hub_model_id: emanuelaboros/chrono-gliner-ft-hipe2020-fr