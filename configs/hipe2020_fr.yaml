data:
  data_root: data
  dataset: hipe2020
  language: fr
  label_column: NE-COARSE-LIT
  test_file: null
  dev_size: 0.1
  keep_scope: false

model:
  model_name: urchade/gliner_medium-v2.1
  labels:
    - person
    - location
    - organization
    - product
    - time

training:
  output_dir: outputs/chronogliner_ft_hipe2020_fr
  seed: 42
  max_steps: 3000
  per_device_train_batch_size: 4
  learning_rate: 0.000005
  eval_every: 500
  save_steps: 500
  warmup_ratio: 0.1
  weight_decay: 0.01
  threshold: 0.5
  fp16: true
  bf16: false

hub:
  push_to_hub: false
  hub_model_id: emanuelaboros/chrono-gliner-ft-fr